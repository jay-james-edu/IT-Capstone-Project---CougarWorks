<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - CougarWorks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>CougarWorks Login</h2>
        <form onsubmit="handleLogin(event)">

            <div style="margin-bottom: 10px;">
                <label for="role" style="display:block; font-weight:bold; margin-bottom:5px;">Select Role:</label>
                <select id="role" class="login-container input" style="width: 100%; padding: 12px;">
                    <option value="student">Student</option>
                    <option value="advisor">Advisor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <input type="text" id="id" class="login-container input" placeholder="ID / Username (e.g., S1001, admin)" required>
            <input type="password" id="password" class="login-container input" placeholder="Password" required>
            <button type="submit">Login</button>
            <div id="error-msg" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const role = document.getElementById('role').value; // Read from dropdown
            const id = document.getElementById('id').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            errorDiv.innerText = "";

            // Remove old guessing logic
            // let role = 'student'; if ... etc (DELETED)

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, id, password })
                });
                const data = await res.json();
                console.log("Login Data:", data); 

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorDiv.innerText = "Server Error";
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
